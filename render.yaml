databases:
  - name: nexvideo-postgres
    databaseName: nexvideo
    user: nexvideo_user
    plan: starter
    region: oregon

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: nexvideo-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  - type: web
    name: nexvideo-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @nexvideo/shared build &&
      pnpm --filter @nexvideo/prompts build &&
      pnpm --filter @nexvideo/database generate &&
      pnpm --filter @nexvideo/database build &&
      pnpm --filter api build
    preDeployCommand: >-
      pnpm --filter @nexvideo/database exec prisma migrate deploy
    startCommand: node apps/api/dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexvideo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexvideo-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_TRENDS_REGION
        value: BR
      - key: MAX_COST_PER_SCRIPT_BRL
        value: "1.5"
      # ── Must be set manually after first deploy ──────────────────────────────
      # FRONTEND_URL: https://nexvideo-web.onrender.com  (used for CORS)
      - key: FRONTEND_URL
        sync: false
      # APP_URL: https://nexvideo-web.onrender.com       (used in email links)
      - key: APP_URL
        sync: false
      # Stripe success/cancel/portal URLs must reference the web service URL
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: STRIPE_PORTAL_RETURN_URL
        sync: false
      # ── Secrets — set in Render dashboard ───────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ─── Worker (BullMQ) ────────────────────────────────────────────────────────
  - type: worker
    name: nexvideo-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @nexvideo/shared build &&
      pnpm --filter @nexvideo/prompts build &&
      pnpm --filter @nexvideo/database generate &&
      pnpm --filter @nexvideo/database build &&
      pnpm --filter worker build
    startCommand: node apps/worker/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexvideo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexvideo-redis
          property: connectionString
      # API_URL: set to https://nexvideo-api.onrender.com after API is deployed
      - key: API_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ─── Web (Next.js) ──────────────────────────────────────────────────────────
  - type: web
    name: nexvideo-web
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @nexvideo/shared build &&
      pnpm --filter @nexvideo/ui build &&
      pnpm --filter web build
    startCommand: node apps/web/.next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Set to https://nexvideo-api.onrender.com after API is deployed
      - key: NEXT_PUBLIC_API_URL
        sync: false
