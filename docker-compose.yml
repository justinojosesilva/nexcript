version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: nexvideo-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexvideo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexvideo-redis
    restart: always
    ports:
      - '6379:6379'

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexvideo-pgadmin
    restart: always
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexvideo.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres_data: